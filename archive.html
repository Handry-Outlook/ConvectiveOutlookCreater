<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | Thunderstorm Outlook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-ui.css">
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="forecast-utils.js"></script>

    <style>
        :root {
            --dark-grey: #333;
            --light-bg: #f4f7fa;
            --risk-severe: #800080;
        }

        body {
            background-color: var(--light-bg);
            color: #334155;
        }

        .archive-wrapper {
            width: 100%;
            padding: 40px;
        }

        .archive-header {
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 30px;
            padding-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 10px 0 0;
            font-weight: 800;
            font-size: clamp(30px, 4vw, 38px);
            color: #172033;
        }

        .intro-text {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.7;
            max-width: 760px;
        }

        .archive-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .archive-card {
            display: grid;
            grid-template-columns: 240px 100px 1fr;
            background: #fff;
            border: 1px solid #dbe4ef;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease-in-out;
            overflow: hidden;
        }

        .archive-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.08);
        }

        .map-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #eee;
            border-right: 1px solid #eee;
        }

        /* Risk Badge Column */
        .risk-col {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fcfcfc;
            border-right: 1px solid #eee;
        }

        .badge-main {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 18px;
            text-align: center;
            box-shadow: 0 12px 20px rgba(15, 23, 42, 0.12);
        }

        .badge-main span {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 400;
            margin-top: -2px;
        }

        /* Info Column */
        .info-col {
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-col h3 { margin: 0 0 10px 0; font-size: 22px; color: var(--dark-grey); font-weight: 700; }
        .info-col p { margin: 4px 0; font-size: 13px; color: #64748b; }
        .info-col strong { color: #333; }

        .loading-state { text-align: center; padding: 60px; color: #94a3b8; font-style: italic; }

        /* Risk Backgrounds (Synced) */
        .bg-low { background-color: var(--risk-2); }
        .bg-vlow { background-color: var(--risk-1); }
        .bg-slgt { background-color: var(--risk-3); }
        .bg-mdt { background-color: var(--risk-4); }
        .bg-high { background-color: var(--risk-5); }
        .bg-svr { background-color: var(--risk-severe); }

        @media (max-width: 768px) {
            .archive-wrapper { padding: 24px; }
            .archive-card { grid-template-columns: 1fr; }
            .map-thumb { height: 150px; border-right: none; border-bottom: 1px solid #eee; }
            .risk-col { padding: 15px; border-right: none; border-bottom: 1px solid #eee; }
        }
    </style>
</head>

<body>

    <header class="top-nav">
        <nav class="nav-left" aria-label="Primary">
            <a href="index.html">Outlooks</a>
            <a href="obs.html">Observations</a>
            <a href="archive.html" class="active">Archive</a>
        </nav>
        <div class="nav-right">
            <a href="admin.html" class="nav-icon-link" title="Forecaster admin"><i class="fas fa-user"></i></a>
        </div>
    </header>

    <main class="page-shell">
        <div class="archive-wrapper page-panel">
            <div class="archive-header">
                <div>
                    <div class="page-eyebrow">Issued Outlooks</div>
                    <h1>Forecast Archive</h1>
                </div>
                <div class="action-row">
                    <a href="index.html" class="btn-ghost"><i class="fas fa-bolt"></i> Live outlook</a>
                    <a href="obs.html" class="btn-secondary"><i class="fas fa-satellite-dish"></i> Observations</a>
                </div>
            </div>

            <p class="intro-text">
                Historical thunderstorm outlooks issued by the forecasting desk. Open any outlook to view the full convective discussion and map.
            </p>

            <div id="archive-list" class="archive-list">
                <div class="loading-state">Fetching published forecasts...</div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD2lgPAtAYksA4guBCITLq_4RkBpavcXjs",
            authDomain: "genweather-f9a45.firebaseapp.com",
            projectId: "genweather-f9a45",
            storageBucket: "genweather-f9a45.firebasestorage.app",
            messagingSenderId: "682497500954",
            appId: "1:682497500954:web:54c400f45cd9b8b6cf2ea3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MAPBOX_TOKEN = 'pk.eyJ1IjoibWV0ZW9ncm91cC1tYXBib3giLCJhIjoiY2pudWJyMWVhMDQ0bjNxdXFsNWJ5M2ZtbSJ9.ANOKYyv5s0VFVbnesnGGUQ';

        async function loadArchive() {
            const listContainer = document.getElementById('archive-list');
            
            const q = query(
                collection(db, "forecasts_v2"), 
                where("isActive", "==", true), 
                orderBy("validFrom", "desc")
            );

            try {
                const querySnapshot = await getDocs(q);
                listContainer.innerHTML = '';

                if (querySnapshot.empty) {
                    listContainer.innerHTML = `<div class="loading-state">No published forecasts found.</div>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    let geoJSON = JSON.parse(data.geoJSON);
                    const displayFeatures = window.GenWeatherUtils
                        ? window.GenWeatherUtils.normalizeDisplayFeatures(geoJSON.features)
                        : geoJSON.features;

                    geoJSON = {
                        type: 'FeatureCollection',
                        features: displayFeatures
                    };

                    geoJSON.features = geoJSON.features.map(f => {
                        const col = f.properties.color || "#cccccc";
                        return {
                            ...f,
                            properties: {
                                ...f.properties,
                                "fill": col,
                                "fill-opacity": 0.6,
                                "stroke": col,
                                "stroke-width": 2
                            }
                        };
                    });

                    // Author Clean (email to username)
                    const authorName = data.authorEmail ? data.authorEmail.split('@')[0] : "Forecaster";

                    // Determine Primary Risk for Badge
                    const risks = geoJSON.features.map(f => (f.properties.risk || 'LOW').toUpperCase());
                    let primaryRisk = 'LOW';
                    let riskNum = '2';
                    
                    if (risks.some(r => r.includes('SEVERE'))) { primaryRisk = 'SVR'; riskNum = '!'; }
                    else if (risks.some(r => r.includes('HIGH'))) { primaryRisk = 'HIGH'; riskNum = '5'; }
                    else if (risks.some(r => r.includes('MODERATE'))) { primaryRisk = 'MDT'; riskNum = '4'; }
                    else if (risks.some(r => r.includes('SLIGHT'))) { primaryRisk = 'SLGT'; riskNum = '3'; }
                    else if (risks.some(r => r.includes('LOW'))) { primaryRisk = 'LOW'; riskNum = '2'; }
                    else { primaryRisk = 'VLOW'; riskNum = '1'; }

                    const encodedGeo = encodeURIComponent(JSON.stringify(geoJSON));
                    const staticMapUrl = `https://api.mapbox.com/styles/v1/mapbox/light-v11/static/geojson(${encodedGeo})/auto/300x200?padding=20&access_token=${MAPBOX_TOKEN}`;

                    const dateTitle = new Date(data.validFrom).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

                    const card = `
                        <a href="forecast-detail.html?id=${id}" class="archive-card">
                            <img src="${staticMapUrl}" class="map-thumb" onerror="this.src='https://via.placeholder.com/300x200?text=Map+Preview'">
                            <div class="risk-col">
                                <div class="badge-main bg-${primaryRisk.toLowerCase()}">
                                    ${riskNum}
                                    <span>${primaryRisk}</span>
                                </div>
                            </div>
                            <div class="info-col">
                                <h3>Thunderstorm Outlook: ${dateTitle}</h3>
                                <p><strong>Period:</strong> ${data.validFrom.replace('T', ' ')} &rarr; ${data.validTo.replace('T', ' ')}</p>
                                <p><strong>Forecaster:</strong> <span style="text-transform: capitalize;">${authorName}</span></p>
                            </div>
                        </a>
                    `;
                    listContainer.insertAdjacentHTML('beforeend', card);
                });
            } catch (err) {
                console.error("Archive Load Error:", err);
                listContainer.innerHTML = '<div class="loading-state">Error connecting to database.</div>';
            }
        }

        loadArchive();
    </script>
</body>
</html>
