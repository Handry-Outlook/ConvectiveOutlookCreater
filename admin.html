<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forecaster Admin - V3.1</title>

    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">

    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.css" type="text/css">

    

    <style>

        :root {

            --primary: #1e293b;

            --accent: #da2128;

            --success: #10b981;

            --sidebar-bg: #f1f5f9;

        }



        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f8fafc; }

        

        /* Layout */

        #history-panel { width: 320px; background: #fff; border-right: 1px solid #e2e8f0; display: none; flex-direction: column; z-index: 10; }

        #control-panel { width: 340px; background: var(--sidebar-bg); padding: 20px; border-right: 1px solid #e2e8f0; overflow-y: auto; display: none; z-index: 10; }

        #map { flex: 1; display: none; }



        /* Login */

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }

        .login-box { background: white; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }

        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }

        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }



        /* History */

        .panel-header { padding: 16px; background: #fff; border-bottom: 1px solid #e2e8f0; }

        .sort-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }

        

        .btn-new { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: opacity 0.2s; }

        

        #history-list { flex: 1; overflow-y: auto; padding: 12px; background: #f8fafc; }

        

        .history-item { 

            background: white; padding: 14px; margin-bottom: 12px; border-radius: 10px; 

            border: 1px solid #e2e8f0; cursor: pointer; position: relative; transition: all 0.2s;

        }

        .history-item:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }

        .history-item.active-item { border-left: 6px solid var(--accent); background: #fff1f2; }



        .history-meta { font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 4px; display: flex; justify-content: space-between; }

        .risk-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #eee; color: #333; }

        

        .publish-btn { 

            margin-top: 10px; width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #cbd5e1;

            font-size: 11px; font-weight: bold; cursor: pointer; background: #fff;

        }

        .publish-btn.is-active { background: var(--success); color: white; border-color: var(--success); }



        /* Form */

        h2#editor-title { margin: 0 0 20px 0; color: var(--primary); font-size: 20px; }

        .form-group { margin-bottom: 18px; }

        label { display: block; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; margin-bottom: 6px; }

        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }

        

        .btn-save { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; cursor: pointer; font-size: 15px; border-radius: 8px; font-weight: bold; }

        .btn-logout { background: transparent; color: #64748b; border: 1px solid #cbd5e1; padding: 4px 8px; border-radius: 4px; cursor: pointer; float: right; font-size: 10px; }



        #layer-stack div { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #e2e8f0; }

        .color-preview { width: 12px; height: 12px; border-radius: 3px; }

    </style>

</head>

<body>



    <div id="login-overlay">

        <div class="login-box">

            <h2>Forecaster Portal</h2>

            <input type="email" id="email" placeholder="Email">

            <input type="password" id="password" placeholder="Password">

            <button id="login-btn">Login</button>

            <p id="error-msg" style="color:#ef4444; font-size:12px; margin-top:10px;"></p>

        </div>

    </div>



    <div id="history-panel">

        <div class="panel-header">

            <button class="btn-new" id="new-btn">+ NEW OUTLOOK</button>

            <div class="sort-row">

                <select id="filter-author">

                    <option value="all">Everyone</option>

                    <option value="mine">My Posts</option>

                </select>

                <select id="sort-by">

                    <option value="updatedAt">Latest Update</option>

                    <option value="createdAt">Creation Date</option>

                    <option value="maxRiskRank">Highest Risk</option>

                    <option value="validFrom">Valid Date</option>

                </select>

            </div>

        </div>

        <div id="history-list"></div>

    </div>



    <div id="control-panel">

        <button id="logout-btn" class="btn-logout">Logout</button>

        <h2 id="editor-title">New Outlook</h2>

        

        <div class="form-group">

            <label>1. Risk Tool</label>

            <select id="risk-level-selector">

                <option value="1 Very Low" data-color="#c29f92" data-rank="1">1 Very Low</option>

                <option value="2 Low" data-color="#00aeef" data-rank="2">2 Low</option>

                <option value="3 Slight" data-color="#5da848" data-rank="3">3 Slight</option>

                <option value="4 Moderate" data-color="#f7941d" data-rank="4">4 Moderate</option>

                <option value="5 High" data-color="#da2128" data-rank="5">5 High</option>

                <option value="6 SEVERE" data-color="#800080" data-rank="6">6 SEVERE</option>

            </select>

        </div>



        <div class="form-group">

            <label>2. Validity</label>

            <div style="display:flex; gap:5px;">

                <input type="datetime-local" id="valid-from">

                <input type="datetime-local" id="valid-to">

            </div>

        </div>



        <div class="form-group">

            <label>3. Discussion</label>

            <textarea id="forecast-text" placeholder="Meteorological discussion..."></textarea>

        </div>



        <button class="btn-save" id="save-forecast">PUBLISH OUTLOOK</button>

        <div id="status" style="margin-top:10px; text-align:center; font-weight:600; font-size:13px;"></div>



        <div style="margin-top:20px;">

            <label>Active Layers</label>

            <div id="layer-stack"></div>

        </div>

    </div>



    <div id="map"></div>



    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>

    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.js"></script>

    

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, doc, updateDoc, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";



        // CONFIG

        const firebaseConfig = {

            apiKey: "AIzaSyD2lgPAtAYksA4guBCITLq_4RkBpavcXjs",

            authDomain: "genweather-f9a45.firebaseapp.com",

            projectId: "genweather-f9a45",

            storageBucket: "genweather-f9a45.firebasestorage.app",

            messagingSenderId: "682497500954",

            appId: "1:682497500954:web:54c400f45cd9b8b6cf2ea3"

        };

        const mapboxToken = 'pk.eyJ1IjoibWV0ZW9ncm91cC1tYXBib3giLCJhIjoiY2pudWJyMWVhMDQ0bjNxdXFsNWJ5M2ZtbSJ9.ANOKYyv5s0VFVbnesnGGUQ';



        const app = initializeApp(firebaseConfig);

        const auth = getAuth(app);

        const db = getFirestore(app);



        mapboxgl.accessToken = mapboxToken;

        const map = new mapboxgl.Map({

            container: 'map',

            style: 'mapbox://styles/mapbox/light-v11',

            center: [-2.5, 54.5],

            zoom: 5

        });



        const riskSelector = document.getElementById('risk-level-selector');

        const getSelectedColor = () => riskSelector.options[riskSelector.selectedIndex].dataset.color;

        const getSelectedRisk = () => riskSelector.value;

        const getSelectedRank = () => parseInt(riskSelector.options[riskSelector.selectedIndex].dataset.rank);



        // --- MAPBOX DRAW STYLING (FIXED COLOR LOGIC) ---

        // --- UPDATED MAPBOX DRAW CONFIGURATION ---

const draw = new MapboxDraw({

    displayControlsDefault: false,

    controls: { polygon: true, trash: true },

    userProperties: true, 

    styles: [

        // 1. ACTIVE FILL (The polygon being drawn right now)

        {

            'id': 'gl-draw-polygon-fill-active',

            'type': 'fill',

            'filter': ['all', ['==', '$type', 'Polygon'], ['!=', 'mode', 'static']],

            'paint': {

                // 'coalesce' tries to get the user_color; if it's missing (drawing phase), it uses the current selector color

                'fill-color': ['coalesce', ['get', 'user_color'], getSelectedColor()],

                'fill-opacity': 0.4

            }

        },

        // 2. STATIC FILL (Drawn polygons already in the list)

        {

            'id': 'gl-draw-polygon-fill-static',

            'type': 'fill',

            'filter': ['all', ['==', '$type', 'Polygon'], ['==', 'mode', 'static']],

            'paint': {

                'fill-color': ['coalesce', ['get', 'user_color'], '#333333'],

                'fill-opacity': 0.4

            }

        },

        // 3. STROKE/OUTLINE (Updates live)

        {

            'id': 'gl-draw-polygon-stroke-active',

            'type': 'line',

            'filter': ['all', ['==', '$type', 'Polygon']],

            'paint': {

                'line-color': ['coalesce', ['get', 'user_color'], getSelectedColor()],

                'line-width': 3

            }

        },

        // 4. VERTICES (Dots on corners)

        {

            'id': 'gl-draw-point-active',

            'type': 'circle',

            'filter': ['all', ['==', '$type', 'Point'], ['!=', 'mode', 'static']],

            'paint': { 

                'circle-radius': 6, 

                'circle-color': '#fff', 

                'circle-stroke-color': getSelectedColor(), 

                'circle-stroke-width': 2 

            }

        }

    ]

});



// --- THE CRITICAL FIX: REAL-TIME PROPERTY INJECTION ---

// We listen for the start of a draw and force the property into the feature immediately

map.on('draw.modechange', (e) => {

    if (e.mode === 'draw_polygon') {

        // Set a small interval to check for the 'active' feature and stamp the color

        const checkActive = setInterval(() => {

            const selected = draw.getSelected();

            if (selected.features.length > 0) {

                const id = selected.features[0].id;

                draw.setFeatureProperty(id, 'user_color', getSelectedColor());

                draw.setFeatureProperty(id, 'user_risk', getSelectedRisk());

                draw.setFeatureProperty(id, 'user_rank', getSelectedRank());

                clearInterval(checkActive);

            }

        }, 50); 

    }

});



// Update colors if the user changes the dropdown while still drawing/selecting

riskSelector.addEventListener('change', () => {

    const selected = draw.getSelectedIds();

    selected.forEach(id => {

        draw.setFeatureProperty(id, 'user_color', getSelectedColor());

        draw.setFeatureProperty(id, 'user_risk', getSelectedRisk());

        draw.setFeatureProperty(id, 'user_rank', getSelectedRank());

    });

    // Force a map refresh to apply new expression values

    map.setPaintProperty('gl-draw-polygon-fill-active.hot', 'fill-color', ['coalesce', ['get', 'user_color'], getSelectedColor()]);

});

        map.addControl(draw);



        let currentUser = null;

        let currentEditingDocId = null;

        let historyUnsubscribe;



        onAuthStateChanged(auth, (user) => {

            currentUser = user;

            if (user) {

                ['login-overlay', 'control-panel', 'history-panel', 'map'].forEach(id => {

                    document.getElementById(id).style.display = (id === 'login-overlay' ? 'none' : (id === 'history-panel' ? 'flex' : 'block'));

                });

                map.resize();

                initHistoryListener();

                setDefaultDates();

            } else {

                document.getElementById('login-overlay').style.display = 'flex';

            }

        });



        // --- DYNAMIC COLOR INJECTION ---

        // This ensures the color is set the moment the polygon is created

        map.on('draw.create', (e) => {

            e.features.forEach(f => {

                draw.setFeatureProperty(f.id, 'user_color', getSelectedColor());

                draw.setFeatureProperty(f.id, 'user_risk', getSelectedRisk());

                draw.setFeatureProperty(f.id, 'user_rank', getSelectedRank());

            });

            updateLayerStackUI();

        });



        // This handles changing color for a polygon ALREADY selected

        riskSelector.addEventListener('change', () => {

            const selected = draw.getSelectedIds();

            selected.forEach(id => {

                draw.setFeatureProperty(id, 'user_color', getSelectedColor());

                draw.setFeatureProperty(id, 'user_risk', getSelectedRisk());

                draw.setFeatureProperty(id, 'user_rank', getSelectedRank());

            });

            updateLayerStackUI();

        });



        // SAVE LOGIC

        document.getElementById('save-forecast').addEventListener('click', async () => {

            const allFeatures = draw.getAll();

            if (allFeatures.features.length === 0) return alert("Draw a polygon first.");



            const maxRank = Math.max(...allFeatures.features.map(f => f.properties.user_rank || 0));

            const geoJSON = {

                type: 'FeatureCollection',

                features: allFeatures.features.map(f => ({

                    type: 'Feature',

                    geometry: f.geometry,

                    properties: {

                        risk: f.properties.user_risk,

                        color: f.properties.user_color,

                        rank: f.properties.user_rank

                    }

                }))

            };



            const data = {

                geoJSON: JSON.stringify(geoJSON),

                validFrom: document.getElementById('valid-from').value,

                validTo: document.getElementById('valid-to').value,

                description: document.getElementById('forecast-text').value,

                isActive: true,

                authorEmail: currentUser.email,

                authorUid: currentUser.uid,

                maxRiskRank: maxRank,

                updatedAt: new Date().toISOString()

            };



            try {

                if (currentEditingDocId) {

                    await updateDoc(doc(db, "forecasts_v2", currentEditingDocId), data);

                    showStatus("Outlook Updated!", "var(--success)");

                } else {

                    data.createdAt = new Date().toISOString();

                    await addDoc(collection(db, "forecasts_v2"), data);

                    showStatus("Outlook Published!", "var(--success)");

                }

                resetForm();

            } catch (e) { showStatus(e.message, "var(--accent)"); }

        });



        // HISTORY & FILTERING

        function initHistoryListener() {

            if (historyUnsubscribe) historyUnsubscribe();

            const filter = document.getElementById('filter-author').value;

            const sortField = document.getElementById('sort-by').value;

            

            let q = query(collection(db, "forecasts_v2"), orderBy(sortField, "desc"));

            if (filter === 'mine') q = query(collection(db, "forecasts_v2"), where("authorUid", "==", currentUser.uid), orderBy(sortField, "desc"));



            historyUnsubscribe = onSnapshot(q, (snapshot) => {

                const list = document.getElementById('history-list');

                list.innerHTML = "";

                snapshot.forEach(docSnap => {

                    const d = docSnap.data();

                    const id = docSnap.id;

                    const item = document.createElement('div');

                    item.className = `history-item ${id === currentEditingDocId ? 'active-item' : ''}`;

                    

                    // Click on box loads the outlook

                    item.onclick = (e) => {

                        if (e.target.tagName !== 'BUTTON') loadToEdit(id, d);

                    };

                    

                    item.innerHTML = `

                        <div class="history-meta">

                            <span>Created: ${new Date(d.createdAt).toLocaleDateString()}</span>

                            <span class="risk-badge">Max Rank: ${d.maxRiskRank || 0}</span>

                        </div>

                        <div style="font-size:12px; font-weight:600; color:var(--primary)">${d.authorEmail}</div>

                        <div style="font-size:10px; color:#64748b; margin-top:2px;">Valid From: ${d.validFrom.replace('T', ' ')}</div>

                        <button class="publish-btn ${d.isActive ? 'is-active' : ''}" 

                            onclick="window.togglePublish('${id}', ${!d.isActive})">

                            ${d.isActive ? '✓ PUBLISHED' : 'UNPUBLISHED (PUBLISH IT?)'}

                        </button>

                    `;

                    list.appendChild(item);

                });

            });

        }



        window.loadToEdit = (id, data) => {

            currentEditingDocId = id;

            document.getElementById('editor-title').innerText = "Edit Outlook";

            document.getElementById('valid-from').value = data.validFrom;

            document.getElementById('valid-to').value = data.validTo;

            document.getElementById('forecast-text').value = data.description;

            

            draw.deleteAll();

            const geo = JSON.parse(data.geoJSON);

            geo.features.forEach(f => {

                // Map Firebase properties back to Draw properties

                f.properties.user_color = f.properties.color;

                f.properties.user_risk = f.properties.risk;

                f.properties.user_rank = f.properties.rank;

                draw.add(f);

            });

            updateLayerStackUI();

            initHistoryListener(); // Refresh list to show active state

        };



        window.togglePublish = async (id, state) => {

            await updateDoc(doc(db, "forecasts_v2", id), { isActive: state, updatedAt: new Date().toISOString() });

        };



        function resetForm() {

            currentEditingDocId = null;

            document.getElementById('editor-title').innerText = "New Outlook";

            document.getElementById('forecast-text').value = "";

            draw.deleteAll();

            updateLayerStackUI();

            setDefaultDates();

            initHistoryListener();

        }



        function updateLayerStackUI() {

            const stack = document.getElementById('layer-stack');

            stack.innerHTML = "";

            draw.getAll().features.forEach(f => {

                const div = document.createElement('div');

                div.innerHTML = `<div class="color-preview" style="background:${f.properties.user_color || '#ccc'}"></div> ${f.properties.user_risk || 'New Polygon'}`;

                stack.appendChild(div);

            });

        }



        function setDefaultDates() {

            const now = new Date();

            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());

            document.getElementById('valid-from').value = now.toISOString().slice(0,16);

            now.setHours(now.getHours() + 24);

            document.getElementById('valid-to').value = now.toISOString().slice(0,16);

        }



        function showStatus(msg, color) {

            const s = document.getElementById('status');

            s.innerText = msg; s.style.color = color;

            setTimeout(() => s.innerText = "", 3000);

        }



        document.getElementById('filter-author').addEventListener('change', initHistoryListener);

        document.getElementById('sort-by').addEventListener('change', initHistoryListener);

        document.getElementById('new-btn').addEventListener('click', resetForm);

        document.getElementById('login-btn').addEventListener('click', () => {

            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)

                .catch(e => document.getElementById('error-msg').innerText = e.message);

        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    </script>

</body>

</html>
